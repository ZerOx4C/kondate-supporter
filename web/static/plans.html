<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>献立 - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <fieldset class="inline-form date-range">
      <legend>検討期間</legend>
      <label>
        開始日
        <input type="date" id="range-from">
      </label>
      <label>
        終了日
        <input type="date" id="range-to">
      </label>
    </fieldset>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html">在庫</a></li>
        <li><a href="/recipes.html">レシピ</a></li>
        <li><a href="/plans.html" aria-current="page">献立</a></li>
        <li><a href="/shoppinglist.html">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>献立</h2>

    <table id="plan-table">
      <thead>
        <tr>
          <th>日付</th>
          <th>献立</th>
        </tr>
      </thead>
      <tbody id="plan-list"></tbody>
    </table>

    <form id="plan-form" class="inline-form">
      <input type="hidden" id="plan-id">
      <label>
        日付
        <input type="date" id="plan-date" required>
      </label>
      <label>
        区分
        <select id="plan-meal-time" required>
          <option value="morning">朝</option>
          <option value="noon">昼</option>
          <option value="night">夜</option>
          <option value="other">その他</option>
        </select>
      </label>
      <fieldset class="recipe-picker" id="recipe-picker">
        <legend>レシピ</legend>
        <input type="hidden" id="plan-recipe">

        <div class="field-row">
          <label>
            レシピ名で検索
            <input type="text" id="recipe-search-field" placeholder="レシピ名で検索" autocomplete="off">
          </label>
          <button type="button" id="recipe-ingredient-filter-open">含める食材で絞り込む</button>
        </div>

        <div id="recipe-selected-ingredients" class="selected-ingredient-chips"></div>

        <ul id="recipe-picker-list" class="recipe-picker-list"></ul>
        <p class="recipe-picker-current">選択中: <strong id="recipe-picker-current-name">(未選択)</strong></p>
      </fieldset>
      <label>
        人数
        <input type="number" id="plan-servings" min="1" step="1" required>
      </label>
      <button type="submit" id="plan-submit">追加</button>
      <button type="button" id="plan-cancel" hidden>キャンセル</button>
    </form>
    <p class="error" id="plan-error"></p>

    <dialog id="recipe-ingredient-filter-dialog" class="ingredient-filter-dialog">
      <label>
        食材を検索
        <input type="text" id="recipe-ingredient-search-field" placeholder="食材名で検索" autocomplete="off">
      </label>
      <ul id="recipe-ingredient-filter-list" class="ingredient-filter-list"></ul>
      <div class="dialog-actions">
        <button type="button" id="recipe-ingredient-filter-close">決定</button>
      </div>
    </dialog>

    <h3>材料集計</h3>
    <p>表示期間の献立に必要な食材と、在庫からの残りを表示します。</p>

    <table id="summary-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>必要量</th>
          <th>残り</th>
        </tr>
      </thead>
      <tbody id="summary-list"></tbody>
    </table>
    <p id="summary-empty" hidden>表示できる食材がありません。</p>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/daterange.js"></script>
  <script src="/js/plans.js"></script>
</body>
</html>
