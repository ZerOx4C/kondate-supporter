<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>献立 - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <fieldset class="inline-form date-range">
      <legend>検討期間</legend>
      <input type="date" id="range-from" aria-label="開始日">
      <span>～</span>
      <input type="date" id="range-to" aria-label="終了日">
    </fieldset>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html">在庫</a></li>
        <li><a href="/recipes.html">レシピ</a></li>
        <li><a href="/plans.html" aria-current="page">献立</a></li>
        <li><a href="/shoppinglist.html">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>献立</h2>

    <table id="plan-table">
      <thead>
        <tr>
          <th>日付</th>
          <th>献立</th>
        </tr>
      </thead>
      <tbody id="plan-list"></tbody>
    </table>

    <dialog id="plan-dialog" class="plan-dialog">
      <h3 id="plan-dialog-title">献立を追加</h3>
      <form id="plan-form" class="inline-form">
        <input type="hidden" id="plan-id">
        <select id="plan-date" required aria-label="日付"></select>
        <select id="plan-meal-time" required aria-label="区分">
          <option value="morning">朝</option>
          <option value="noon">昼</option>
          <option value="night">夜</option>
          <option value="other">その他</option>
        </select>
        <div id="plan-recipe-fields">
          <p class="plan-recipe-display">レシピ: <strong id="plan-recipe-name"></strong></p>
          <input type="hidden" id="plan-recipe">
          <input type="number" id="plan-servings" min="1" step="1" required aria-label="人数">人分
          <div id="plan-ingredient-requirements">
            <p class="plan-ingredient-requirements-label">必要な食材</p>
            <table class="plan-ingredient-requirements-table">
              <thead>
                <tr>
                  <th>食材</th>
                  <th>必要量</th>
                  <th>調整</th>
                </tr>
              </thead>
              <tbody id="plan-ingredient-requirements-list"></tbody>
            </table>
          </div>
        </div>
        <div id="plan-note-fields" hidden>
          <label>
            メモ
            <textarea id="plan-note" rows="3" placeholder="外食予定や作り置きなど" required></textarea>
          </label>
        </div>
        <p class="error" id="plan-error"></p>
        <div class="dialog-actions">
          <button type="button" id="plan-dialog-cancel">キャンセル</button>
          <button type="submit" id="plan-submit">保存</button>
        </div>
      </form>
    </dialog>

    <h3>材料集計</h3>
    <p>表示期間の献立に必要な食材と、在庫からの残りを表示します。</p>

    <table id="summary-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>必要量</th>
          <th>残り</th>
        </tr>
      </thead>
      <tbody id="summary-list"></tbody>
    </table>
    <p id="summary-empty" hidden>表示できる食材がありません。</p>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/daterange.js"></script>
  <script src="/js/dialog.js"></script>
  <script src="/js/plans.js"></script>
</body>
</html>
