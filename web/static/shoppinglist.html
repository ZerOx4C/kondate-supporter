<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>買い物リスト - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html">在庫</a></li>
        <li><a href="/recipes.html">レシピ</a></li>
        <li><a href="/plans.html">献立</a></li>
        <li><a href="/shoppinglist.html" aria-current="page">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>買い物リスト</h2>
    <p>指定した期間の献立に対し、在庫が不足している食材を表示します。</p>

    <form id="range-form" class="inline-form">
      <label>
        開始日
        <input type="date" id="range-from">
      </label>
      <label>
        終了日
        <input type="date" id="range-to">
      </label>
      <button type="submit">表示</button>
    </form>

    <table id="shoppinglist-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>単位</th>
          <th>必要量</th>
          <th>在庫</th>
          <th>不足量</th>
        </tr>
      </thead>
      <tbody id="shoppinglist-list"></tbody>
    </table>
    <p id="shoppinglist-empty" hidden>不足している食材はありません。</p>
    <p class="error" id="shoppinglist-error"></p>

    <button type="button" id="copy-button">買い物リストをコピー</button>
    <span id="copy-status"></span>

    <h3>繰越になる食材</h3>
    <p>指定した期間の献立に対し、在庫が必要量を上回り繰り越しになる食材を表示します。</p>

    <table id="surplus-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>単位</th>
          <th>必要量</th>
          <th>在庫</th>
          <th>余剰量</th>
        </tr>
      </thead>
      <tbody id="surplus-list"></tbody>
    </table>
    <p id="surplus-empty" hidden>繰越になる食材はありません。</p>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/shoppinglist.js"></script>
</body>
</html>
