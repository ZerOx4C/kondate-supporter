<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>レシピ - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <fieldset class="inline-form date-range">
      <legend>検討期間</legend>
      <input type="date" id="range-from" aria-label="開始日">
      <span>～</span>
      <input type="date" id="range-to" aria-label="終了日">
    </fieldset>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html">在庫</a></li>
        <li><a href="/recipes.html" aria-current="page">レシピ</a></li>
        <li><a href="/plans.html">献立</a></li>
        <li><a href="/shoppinglist.html">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>レシピ</h2>

    <div class="field-row">
      <label>
        レシピ名で検索
        <input type="text" id="recipe-search-field" placeholder="レシピ名で検索" autocomplete="off">
      </label>
      <button type="button" id="recipe-ingredient-filter-open">含める食材で絞り込む</button>
      <button type="button" id="recipe-create-button" hidden></button>
    </div>

    <div id="recipe-selected-ingredients" class="selected-ingredient-chips"></div>

    <table id="recipe-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>材料</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="recipe-list"></tbody>
    </table>
    <p class="error" id="recipe-list-error"></p>

    <dialog id="recipe-dialog" class="recipe-dialog">
      <h3 id="recipe-dialog-title">レシピを作成</h3>
      <form id="recipe-form">
        <input type="hidden" id="recipe-id">
        <div class="field-row">
          <label>
            名前
            <input type="text" id="recipe-name" required>
          </label>
          <label>
            人数
            <input type="number" id="recipe-servings" min="1" step="1" required>
          </label>
        </div>
        <div class="field-row">
          <label>
            参考URL
            <input type="url" id="recipe-url" placeholder="https://...">
          </label>
        </div>

        <h4>材料</h4>
        <div id="ingredient-rows"></div>
        <button type="button" id="add-ingredient-row">材料を追加</button>

        <h4>手順</h4>
        <div id="step-rows"></div>
        <button type="button" id="add-step-row">手順を追加</button>

        <p class="error" id="recipe-error"></p>
        <div class="dialog-actions">
          <button type="button" id="recipe-dialog-cancel">キャンセル</button>
          <button type="submit" id="recipe-submit">保存</button>
        </div>
      </form>
    </dialog>

    <dialog id="use-recipe-dialog" class="recipe-dialog">
      <h3 id="use-recipe-dialog-title">献立に追加</h3>
      <form id="use-recipe-form" class="inline-form">
        <select id="use-recipe-date" required aria-label="日付"></select>
        <select id="use-recipe-meal-time" required aria-label="区分">
          <option value="morning">朝</option>
          <option value="noon">昼</option>
          <option value="night">夜</option>
          <option value="other">その他</option>
        </select>
        <input type="number" id="use-recipe-servings" min="1" step="1" required aria-label="人数">人分
        <p class="error" id="use-recipe-error"></p>
        <div class="dialog-actions">
          <button type="button" id="use-recipe-cancel">キャンセル</button>
          <button type="submit" id="use-recipe-submit">追加</button>
        </div>
      </form>
    </dialog>

    <dialog id="recipe-view-dialog" class="recipe-dialog">
      <h3 id="recipe-view-title"></h3>
      <p id="recipe-view-url" class="recipe-view-url"></p>
      <h4>手順</h4>
      <ol id="recipe-view-steps"></ol>
      <p id="recipe-view-steps-empty" hidden>手順は登録されていません。</p>
      <div class="dialog-actions">
        <button type="button" id="recipe-view-close">閉じる</button>
      </div>
    </dialog>

    <dialog id="recipe-ingredient-filter-dialog" class="ingredient-filter-dialog">
      <label>
        食材を検索
        <input type="text" id="recipe-ingredient-search-field" placeholder="食材名で検索" autocomplete="off">
      </label>
      <ul id="recipe-ingredient-filter-list" class="ingredient-filter-list"></ul>
      <div class="dialog-actions">
        <button type="button" id="recipe-ingredient-filter-close">決定</button>
      </div>
    </dialog>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/daterange.js"></script>
  <script src="/js/dialog.js"></script>
  <script src="/js/recipes.js"></script>
</body>
</html>
