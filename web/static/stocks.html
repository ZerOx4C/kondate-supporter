<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>在庫 - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html" aria-current="page">在庫</a></li>
        <li><a href="/recipes.html">レシピ</a></li>
        <li><a href="/plans.html">献立</a></li>
        <li><a href="/shoppinglist.html">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>在庫</h2>

    <label class="checkbox-label">
      <input type="checkbox" id="show-zero-toggle">
      数量0の食材も表示する
    </label>

    <table id="stock-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>単位</th>
          <th>数量</th>
          <th>更新日時</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stock-list"></tbody>
    </table>
    <p class="error" id="stock-error"></p>

    <h3>新しい食材を登録</h3>
    <form id="new-ingredient-form" class="inline-form">
      <label>
        名前
        <input type="text" id="new-ingredient-name" required>
      </label>
      <label>
        単位
        <input type="text" id="new-ingredient-unit" placeholder="g, 本, 個 など" required>
      </label>
      <button type="submit">登録</button>
    </form>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/stocks.js"></script>
</body>
</html>
