<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>在庫 - kondate-supporter</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>kondate-supporter</h1>
    <nav>
      <ul>
        <li><a href="/">トップ</a></li>
        <li><a href="/ingredients.html">食材マスタ</a></li>
        <li><a href="/stocks.html" aria-current="page">在庫</a></li>
        <li><a href="/recipes.html">レシピ</a></li>
        <li><a href="/plans.html">献立</a></li>
        <li><a href="/shoppinglist.html">買い物リスト</a></li>
      </ul>
    </nav>
  </header>
  <main>
    <h2>在庫</h2>

    <label class="stock-search">
      食材を検索
      <input type="text" id="stock-search" placeholder="2文字以上入力して検索">
    </label>

    <div id="new-ingredient-panel" class="new-ingredient-panel" hidden>
      <p>「<span id="new-ingredient-query"></span>」を新規食材として登録</p>
      <form id="new-ingredient-form" class="inline-form">
        <label>
          単位
          <input type="text" id="new-ingredient-unit" placeholder="g, 本, 個 など" required>
        </label>
        <button type="submit">追加</button>
      </form>
    </div>

    <table id="stock-table">
      <thead>
        <tr>
          <th>名前</th>
          <th>単位</th>
          <th>数量</th>
          <th>更新日時</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="stock-list"></tbody>
    </table>
    <p class="error" id="stock-error"></p>
  </main>
  <script src="/js/api.js"></script>
  <script src="/js/stocks.js"></script>
</body>
</html>
